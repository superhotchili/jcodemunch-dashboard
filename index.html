<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jCodeMunch Savings Dashboard</title>

    <!-- Tailwind CSS (Play CDN for standalone local viewing) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              darker: "#0a0a0c",
              dark: "#121216",
              panel: "#1e1e24",
              accent: "#6366f1",
              accentDark: "#4f46e5",
              success: "#10b981",
            },
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Dashboard Data from Python script -->
    <script src="data.js"></script>

    <style>
      body {
        background-color: theme("colors.darker");
        color: #e2e8f0;
        font-family: "Inter", sans-serif;
      }

      .stat-card {
        background: linear-gradient(
          145deg,
          theme("colors.panel") 0%,
          theme("colors.dark") 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.6);
        border-color: rgba(99, 102, 241, 0.3);
      }

      .glass-header {
        background: rgba(18, 18, 22, 0.7);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .gradient-text {
        background: linear-gradient(to right, #6366f1, #a855f7, #ec4899);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        display: inline-block;
      }
    </style>
  </head>
  <body class="bg-darker text-slate-200 antialiased min-h-screen flex flex-col">
    <!-- Header -->
    <header
      class="glass-header sticky top-0 z-10 w-full px-6 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-white">
            jCodeMunch
          </h1>
          <p class="text-xs text-gray-400 font-medium tracking-wide uppercase">
            Savings Dashboard
          </p>
        </div>
      </div>

      <div class="flex items-center gap-4 text-sm font-medium">
        <div
          class="px-3 py-1.5 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 flex items-center gap-2"
        >
          <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
          Live Data
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-6 py-8 flex flex-col gap-8">
      <!-- Hero Stats Row -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Total Tokens Saved -->
        <div class="stat-card rounded-2xl p-6 relative overflow-hidden group">
          <div
            class="absolute -right-6 -top-6 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl group-hover:bg-indigo-500/20 transition-all duration-500"
          ></div>

          <h2
            class="text-gray-400 text-sm font-semibold tracking-wider uppercase mb-1 flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
              />
            </svg>
            Total Tokens Saved
          </h2>
          <div class="mt-4 flex items-baseline gap-3">
            <span
              id="txt-total-tokens"
              class="block text-4xl sm:text-5xl font-bold text-white tracking-tight font-mono"
              >0</span
            >
            <span class="block text-emerald-400 text-sm font-medium mb-1"
              >tokens</span
            >
          </div>
        </div>

        <!-- Cost Avoided (Opus) -->
        <div class="stat-card rounded-2xl p-6 relative overflow-hidden group">
          <div
            class="absolute -right-6 -top-6 w-32 h-32 bg-purple-500/10 rounded-full blur-2xl group-hover:bg-purple-500/20 transition-all duration-500"
          ></div>

          <h2
            class="text-gray-400 text-sm font-semibold tracking-wider uppercase mb-1 flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            Avoided Cost (Opus)
          </h2>
          <div class="mt-4 flex items-baseline gap-3">
            <span
              id="txt-cost-opus"
              class="block text-4xl sm:text-5xl font-bold gradient-text tracking-tight font-mono"
              >$0.00</span
            >
          </div>
        </div>

        <!-- Cost Avoided (Sonnet) -->
        <div class="stat-card rounded-2xl p-6 relative overflow-hidden group">
          <div
            class="absolute -right-6 -top-6 w-32 h-32 bg-pink-500/10 rounded-full blur-2xl group-hover:bg-pink-500/20 transition-all duration-500"
          ></div>

          <h2
            class="text-gray-400 text-sm font-semibold tracking-wider uppercase mb-1 flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            Avoided Cost (Sonnet 4.6 / Gemini 2.5)
          </h2>
          <div class="mt-4 flex items-baseline gap-3">
            <span
              id="txt-cost-sonnet"
              class="block text-4xl sm:text-5xl font-bold text-white tracking-tight font-mono"
              >$0.00</span
            >
          </div>
        </div>
      </div>

      <!-- Chart Section -->
      <div class="stat-card rounded-2xl p-6 w-full h-[400px] flex flex-col">
        <div class="flex items-center justify-between mb-6">
          <h2
            class="text-gray-300 text-lg font-semibold flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"
              />
            </svg>
            Tokens Saved Over Time
          </h2>
        </div>
        <div class="flex-1 relative w-full h-full min-h-0">
          <canvas id="historyChart"></canvas>
        </div>
      </div>

      <!-- Info Footer -->
      <div class="mt-4 text-center text-sm text-gray-500">
        Data sourced directly from your local jCodeMunch MCP environment. <br />
        Installation ID:
        <span id="txt-anon-id" class="font-mono text-gray-400"></span>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const data = window.JCodeMunchData;
        if (!data) {
          console.error("No data found from data.js");
          return;
        }

        // Fallbacks for empty history
        let historyData = data.history || {};
        // If empty, put dummy so chart isn't fully empty
        if (Object.keys(historyData).length === 0) {
          const today = new Date().toISOString().split("T")[0];
          historyData[today] = data.total_tokens_saved || 0;
        }

        // Update DOM Elements
        document.getElementById("txt-total-tokens").innerText = (
          data.total_tokens_saved || 0
        ).toLocaleString();
        document.getElementById("txt-anon-id").innerText =
          data.anon_id || "Unknown";

        const costs = data.costs_avoided || {};
        const opus = costs["Claude Opus 4.6"] || 0;
        const sonnet = costs["Claude Sonnet 4.6"] || 0;
        const gemini = costs["Gemini 2.5 Pro"] || 0;

        document.getElementById("txt-cost-opus").innerText =
          "$" +
          opus.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });
        document.getElementById("txt-cost-sonnet").innerText =
          "$" +
          sonnet.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }) +
          " / $" +
          gemini.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });

        // Prepare Chart Data
        // Sort dates chronologically
        const dates = Object.keys(historyData).sort();
        const values = dates.map((date) => historyData[date]);

        // Format dates slightly better for X axis
        const labels = dates.map((d) => {
          const parts = d.split("-");
          if (parts.length === 3) return `${parts[1]}/${parts[2]}`;
          return d;
        });

        const ctx = document.getElementById("historyChart").getContext("2d");

        // Chart.js Theme Config
        Chart.defaults.color = "#94a3b8";
        Chart.defaults.font.family = "'Inter', sans-serif";

        new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Tokens Saved",
                data: values,
                backgroundColor: (context) => {
                  const chart = context.chart;
                  const { ctx, chartArea } = chart;
                  if (!chartArea) return "#6366f1";
                  const gradient = ctx.createLinearGradient(
                    0,
                    chartArea.bottom,
                    0,
                    chartArea.top,
                  );
                  gradient.addColorStop(0, "rgba(99, 102, 241, 0.2)");
                  gradient.addColorStop(1, "rgba(168, 85, 247, 0.8)");
                  return gradient;
                },
                borderColor: "#a855f7",
                borderWidth: 1,
                borderRadius: 6,
                barThickness: "flex",
                maxBarThickness: 40,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: "rgba(10, 10, 12, 0.9)",
                titleColor: "#fff",
                bodyColor: "#e2e8f0",
                borderColor: "rgba(255,255,255,0.1)",
                borderWidth: 1,
                padding: 12,
                displayColors: false,
                callbacks: {
                  label: function (context) {
                    return context.parsed.y.toLocaleString() + " tokens saved";
                  },
                },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: {
                  color: "rgba(255, 255, 255, 0.05)",
                  drawBorder: false,
                },
                ticks: {
                  callback: function (value) {
                    if (value >= 1000000)
                      return (value / 1000000).toFixed(1) + "M";
                    if (value >= 1000) return (value / 1000).toFixed(0) + "k";
                    return value;
                  },
                  font: { family: "'JetBrains Mono', monospace", size: 11 },
                },
              },
              x: {
                grid: { display: false, drawBorder: false },
                ticks: { font: { size: 12, weight: "500" } },
              },
            },
            animation: {
              y: {
                duration: 1000,
                easing: "easeOutQuart",
              },
            },
          },
        });
      });
    </script>
  </body>
</html>
